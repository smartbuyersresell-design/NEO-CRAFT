<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Neo Craft — Voxel World</title>
<meta name="description" content="Neo Craft: a neon-lit voxel sandbox you can build and explore, right in the browser.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230a0e1a%22/><rect x=%2225%22 y=%2225%22 width=%2222%22 height=%2222%22 fill=%22%2300f0ff%22/><rect x=%2253%22 y=%2253%22 width=%2222%22 height=%2222%22 fill=%22%23b026ff%22/></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Boot / title screen -->
  <div id="titleScreen">
    <div class="titleGlow"></div>
    <div class="titleWrap">
      <h1 class="logo">NEO<span>CRAFT</span></h1>
      <p class="tagline">build. break. glow.</p>

      <div class="menuCard">
        <label class="fieldLabel" for="seedInput">World seed</label>
        <input id="seedInput" class="seedInput" type="text" placeholder="ඕනෑම වචනයක් හෝ අංකයක්...">

        <button id="newWorldBtn" class="primaryBtn">New World</button>
        <button id="continueBtn" class="secondaryBtn" style="display:none;">Continue Saved World</button>

        <div class="hintRow">
          <span id="deviceHint">Detecting controls…</span>
        </div>
      </div>

      <ul class="controlsHint" id="controlsHintDesktop">
        <li><b>WASD</b> move · <b>Space</b> jump · <b>Mouse</b> look</li>
        <li><b>Left click</b> break · <b>Right click</b> place · <b>1–9</b> select block</li>
      </ul>

      <div id="engineError" class="hidden"></div>
    </div>
  </div>

  <!-- Game canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- Crosshair -->
  <div id="crosshair"></div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="hotbar"></div>

    <div id="statusRow">
      <div id="fpsBadge">60 FPS</div>
      <button id="menuBtn" title="Menu">⏸</button>
    </div>
  </div>

  <!-- Mobile touch controls -->
  <div id="touchControls" class="hidden">
    <div id="joystickZone">
      <div id="joystickBase"><div id="joystickThumb"></div></div>
    </div>
    <div id="lookZone"></div>
    <button id="jumpBtn" class="touchBtn">⤒</button>
    <button id="breakBtn" class="touchBtn touchBtnAction">⛏</button>
    <button id="placeBtn" class="touchBtn touchBtnAction">▦</button>
  </div>

  <!-- Pause menu -->
  <div id="pauseMenu" class="hidden">
    <div class="menuCard">
      <h2>Paused</h2>
      <button id="resumeBtn" class="primaryBtn">Resume</button>
      <button id="saveBtn" class="secondaryBtn">Save World</button>
      <button id="quitBtn" class="secondaryBtn">Quit to Title</button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="js/noise.js"></script>
  <script>
    // Resilient engine loader: tries two CDNs for three.js, then main.js.
    // If everything after this point fails, an on-screen message explains
    // why — instead of a title screen that silently does nothing.
    function showEngineError(msg) {
      var box = document.getElementById('engineError');
      if (!box) return;
      box.classList.remove('hidden');
      box.textContent = msg;
    }

    function loadScript(src) {
      return new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.body.appendChild(s);
      });
    }

    var THREE_SOURCES = [
      'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
      'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js'
    ];

    function loadThreeThenGame(sourceIndex) {
  <script src="js/noise.js"></script>
  <script src="js/three.min.js"></script>
  <script src="js/main.js"></script>
</body>
